<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎻 IntegraMusic Pro</title>

<link rel="stylesheet" href="style.css">

<!-- Fuente -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Pitchy.js -->
<script src="https://cdn.jsdelivr.net/npm/pitchy@4.1.0/dist/pitchy.min.js"></script>

</head>

<body>

<div class="container">

<h1>🎻 IntegraMusic Pro 🎵</h1>

<!-- Mascota MeloMuu -->
<div class="mascota">

<div class="vaquita">

<div class="oreja izquierda"></div>
<div class="oreja derecha"></div>

<div class="cara">

<div class="ojo"></div>
<div class="ojo"></div>

<div class="hocico">

<div class="nariz"></div>

</div>

</div>

</div>

<h2>MeloMuu 🐮</h2>

<p id="estadoVaquita">

¡Hola! Toca tu instrumento y escucharé contigo 🎶

</p>

</div>



<!-- Nota detectada -->

<div class="card">

<h3>🎵 Nota detectada</h3>

<p id="nota">

--

</p>

<p id="frecuencia">

0 Hz

</p>

</div>




<!-- Afinación -->

<div class="card">

<h3>🎯 Afinación</h3>

<p id="afinacion">

--

</p>

</div>




<!-- Intensidad -->

<div class="card">

<h3>🔊 Intensidad</h3>

<p id="dinamica">

mp

</p>

</div>




<!-- Energía -->

<div class="card">

<h3>∫ Energía acumulada</h3>

<p id="energia">

0 J

</p>

</div>




<!-- Botones -->

<button id="iniciar">

🎙 Iniciar

</button>


<button id="detener">

⏹ Detener

</button>




<!-- Gráfica -->

<div class="grafica">

<canvas id="grafica"></canvas>

</div>




<!-- Notas musicales decorativas -->

<div class="notaMusical nota1">♪</div>

<div class="notaMusical nota2">♫</div>

<div class="notaMusical nota3">♬</div>

<div class="notaMusical nota4">♩</div>

<div class="notaMusical nota5">♫</div>

<div class="notaMusical nota6">♪</div>

<div class="notaMusical nota7">♬</div>

<div class="notaMusical nota8">♩</div>



</div>


<script src="script.js"></script>

</body>
</html
